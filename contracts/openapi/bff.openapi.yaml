openapi: 3.1.0
info:
  title: Dexera BFF API
  version: 0.2.0
  description: Public API exposed by Dexera Go BFF.
servers:
  - url: http://localhost:8080
paths:
  /health:
    get:
      summary: BFF liveness and status
      operationId: getHealth
      tags:
        - system
      responses:
        '200':
          description: Health response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/v1/placeholder:
    get:
      summary: Bootstrap placeholder endpoint
      operationId: getPlaceholder
      tags:
        - bootstrap
      responses:
        '200':
          description: Placeholder data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaceholderResponse'
  /api/v1/wallet/challenge:
    post:
      summary: Create a wallet ownership challenge message
      operationId: postWalletChallenge
      tags:
        - wallet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WalletChallengeRequest'
      responses:
        '200':
          description: Wallet challenge response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletChallengeResponse'
  /api/v1/wallet/verify:
    post:
      summary: Verify wallet ownership signature and venue eligibility
      operationId: postWalletVerify
      tags:
        - wallet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WalletVerifyRequest'
      responses:
        '200':
          description: Wallet verification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletVerifyResponse'
  /api/v1/perp/orders/preview:
    post:
      summary: Preview a perpetual order before signing
      operationId: postPerpOrderPreview
      tags:
        - trading
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BuildUnsignedActionRequest'
      responses:
        '200':
          description: Perp order preview response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PerpOrderPreviewResponse'
  /api/v1/perp/actions/unsigned:
    post:
      summary: Build an unsigned perpetual action for client-side wallet submission
      operationId: postBuildUnsignedPerpAction
      tags:
        - trading
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BuildUnsignedActionRequest'
      responses:
        '200':
          description: Unsigned perp action payload response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BuildUnsignedActionResponse'
  /api/v1/perp/positions:
    get:
      summary: Retrieve perpetual positions for an account
      operationId: getPerpPositions
      tags:
        - portfolio
      parameters:
        - in: query
          name: accountId
          required: true
          schema:
            type: string
        - in: query
          name: venue
          required: true
          schema:
            $ref: '#/components/schemas/VenueId'
        - in: query
          name: instrument
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Account positions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PerpPositionsResponse'
components:
  schemas:
    VenueId:
      type: string
      enum: [hyperliquid, aster]
    HealthResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - service
        - timestamp
      properties:
        status:
          type: string
          enum: [ok]
        service:
          type: string
        timestamp:
          type: string
          format: date-time
    PlaceholderResponse:
      type: object
      additionalProperties: false
      required:
        - message
        - source
      properties:
        message:
          type: string
        source:
          type: string
    WalletChallengeRequest:
      type: object
      additionalProperties: false
      required:
        - address
      properties:
        address:
          type: string
    WalletChallengeResponse:
      type: object
      additionalProperties: false
      required:
        - challengeId
        - message
        - issuedAt
        - expiresAt
      properties:
        challengeId:
          type: string
        message:
          type: string
        issuedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
    WalletVerifyRequest:
      type: object
      additionalProperties: false
      required:
        - address
        - challengeId
        - signature
        - venue
      properties:
        address:
          type: string
        challengeId:
          type: string
        signature:
          type: string
        venue:
          $ref: '#/components/schemas/VenueId'
    WalletVerifyResponse:
      type: object
      additionalProperties: false
      required:
        - ownershipVerified
        - venue
        - eligible
        - reason
        - checkedAt
        - source
      properties:
        ownershipVerified:
          type: boolean
        venue:
          $ref: '#/components/schemas/VenueId'
        eligible:
          type: boolean
        reason:
          type: string
        checkedAt:
          type: string
          format: date-time
        source:
          type: string
    PerpOrderRequest:
      type: object
      additionalProperties: false
      required:
        - accountId
        - venue
        - instrument
        - side
        - type
        - size
      properties:
        accountId:
          type: string
        venue:
          $ref: '#/components/schemas/VenueId'
        instrument:
          type: string
        side:
          type: string
          enum: [buy, sell]
        type:
          type: string
          enum: [market, limit]
        size:
          type: string
        limitPrice:
          type: string
        leverage:
          type: string
        reduceOnly:
          type: boolean
        clientOrderId:
          type: string
      allOf:
        - if:
            properties:
              type:
                const: market
          then:
            not:
              required: [limitPrice]
        - if:
            properties:
              type:
                const: limit
          then:
            required: [limitPrice]
    BuildUnsignedActionRequest:
      type: object
      additionalProperties: false
      required:
        - order
      properties:
        order:
          $ref: '#/components/schemas/PerpOrderRequest'
    PerpOrderPreviewResponse:
      type: object
      additionalProperties: false
      required:
        - previewId
        - accountId
        - venue
        - instrument
        - side
        - type
        - size
        - estimatedNotional
        - estimatedFee
        - expiresAt
        - source
      properties:
        previewId:
          type: string
        accountId:
          type: string
        venue:
          $ref: '#/components/schemas/VenueId'
        instrument:
          type: string
        side:
          type: string
          enum: [buy, sell]
        type:
          type: string
          enum: [market, limit]
        size:
          type: string
        limitPrice:
          type: string
        markPrice:
          type: string
        estimatedNotional:
          type: string
        estimatedFee:
          type: string
        expiresAt:
          type: string
          format: date-time
        source:
          type: string
    UnsignedActionPayload:
      type: object
      additionalProperties: false
      required:
        - id
        - accountId
        - venue
        - kind
        - action
      properties:
        id:
          type: string
        accountId:
          type: string
        venue:
          $ref: '#/components/schemas/VenueId'
        kind:
          type: string
          enum: [perp_order_action]
        action:
          type: object
          additionalProperties: true
    BuildUnsignedActionResponse:
      type: object
      additionalProperties: false
      required:
        - orderId
        - signingPolicy
        - disclaimer
        - unsignedActionPayload
      properties:
        orderId:
          type: string
        signingPolicy:
          type: string
          enum: [client-signing-only]
        disclaimer:
          type: string
        unsignedActionPayload:
          $ref: '#/components/schemas/UnsignedActionPayload'
    PerpPosition:
      type: object
      additionalProperties: false
      required:
        - positionId
        - accountId
        - venue
        - instrument
        - direction
        - status
        - size
        - entryPrice
        - markPrice
        - notionalValue
        - unrealizedPnlUsd
        - lastUpdatedAt
      properties:
        positionId:
          type: string
        accountId:
          type: string
        venue:
          $ref: '#/components/schemas/VenueId'
        instrument:
          type: string
        direction:
          type: string
          enum: [long, short]
        status:
          type: string
          enum: [open, closed, liquidated]
        size:
          type: string
        entryPrice:
          type: string
        markPrice:
          type: string
        notionalValue:
          type: string
        leverage:
          type: string
        unrealizedPnlUsd:
          type: string
        lastUpdatedAt:
          type: string
          format: date-time
    PerpPositionsResponse:
      type: object
      additionalProperties: false
      required:
        - accountId
        - venue
        - positions
        - source
      properties:
        accountId:
          type: string
        venue:
          $ref: '#/components/schemas/VenueId'
        positions:
          type: array
          items:
            $ref: '#/components/schemas/PerpPosition'
        source:
          type: string
