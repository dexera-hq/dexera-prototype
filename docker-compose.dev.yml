services:
  api:
    build:
      context: .
      dockerfile: apps/bff-go/Dockerfile
    ports:
      - '8080:8080'
    env_file:
      - .env
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:8080/health >/dev/null || exit 1']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - dexera-dev

networks:
  dexera-dev:
    driver: bridge

