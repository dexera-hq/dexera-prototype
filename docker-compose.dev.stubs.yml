services:
  api:
    depends_on:
      redis-stub:
        condition: service_healthy
      postgres-stub:
        condition: service_healthy

  redis-stub:
    image: redis:7-alpine
    ports:
      - '16379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 2s
    networks:
      - dexera-dev

  postgres-stub:
    image: postgres:16-alpine
    env_file:
      - .env
    ports:
      - '15432:5432'
    volumes:
      - postgres_stub_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    networks:
      - dexera-dev

volumes:
  postgres_stub_data:

networks:
  dexera-dev:
    driver: bridge
