name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ts_checks:
    name: TypeScript / Next.js checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate contracts
        run: pnpm contracts:validate

      - name: Run turbo checks
        run: pnpm turbo run lint typecheck test build --continue

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run web smoke test
        run: pnpm --filter @dexera/web test:e2e:smoke

      - name: Verify generated artifacts are up to date
        run: pnpm codegen:check

  go_checks:
    name: Go checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/bff-go
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  rust_checks:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

  contracts_checks:
    name: Contracts checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate contracts
        run: pnpm contracts:validate

      - name: Check codegen drift
        run: pnpm codegen:check

      - name: Ensure working tree clean
        run: git diff --exit-code
